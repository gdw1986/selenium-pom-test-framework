[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: 运行较慢的测试
    smoke: 冒烟测试
    login: 登录相关测试
    alert: Alert弹窗测试
    dropdown: 下拉框测试
    upload: 文件上传测试
    comment: 评论功能测试
    window: 多窗口测试
